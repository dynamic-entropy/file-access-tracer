# XRootD ofs.notify configuration for file-access-tracer.
#
# XRootD starts the tracer once and pipes matching notify lines to its stdin.
# Adjust binary and log paths to match the site installation.

ofs.notify openr | /usr/local/bin/file-access-tracer

# Optional: append JSON events to a log file
# ofs.notify openr | /bin/sh -c '/usr/local/bin/file-access-tracer >>/var/log/xrootd/access.jsonl 2>>/var/log/xrootd/access.err'
