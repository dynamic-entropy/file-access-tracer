name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Test
        run: go test ./...

      - name: Build Linux binaries
        run: make release-linux VERSION=${{ github.ref_name }}

      - name: Checksums
        run: |
          cd dist
          sha256sum file-access-tracer-linux-* > SHA256SUMS

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/file-access-tracer-linux-amd64
            dist/file-access-tracer-linux-arm64
            dist/SHA256SUMS
          generate_release_notes: true
